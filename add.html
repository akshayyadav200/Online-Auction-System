<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Product to Auction</title>
    <link rel="stylesheet" href="add.css"> <!-- Link to external CSS -->
</head>
<body>

<div class="form-container">
    <h2>Add Product to Auction</h2>
    <form id="productForm">
        <!-- Product Title -->
        <label for="productTitle">Product Title</label>
        <input type="text" id="productTitle" name="productTitle" required placeholder="Enter product title">

        <!-- Product Description -->
        <label for="productDescription">Product Description</label>
        <textarea id="productDescription" name="productDescription" rows="4" required placeholder="Enter product description"></textarea>

        <!-- Product Category -->
        <label for="productCategory">Product Category</label>
        <select id="productCategory" name="productCategory" required>
            <option value="">Select Category</option>
            <option value="watch">Watch</option>
            <option value="clothing">Clothing</option>
            <option value="smartphone">Smartphone</option>
            <option value="painting">Painting</option>
        </select>

        <!-- Starting Price -->
        <label for="startingPrice">Starting Price (Rs)</label>
        <input type="number" id="startingPrice" name="startingPrice" required placeholder="Enter starting price" step="0.01">

        <!-- Product Image -->
        <label for="productImage">Product Image</label>
        <input type="file" id="productImage" name="productImage" accept="image/*" required>

        <!-- Auction Start Time -->
        <label for="auctionStartTime">Auction Start Time</label>
        <input type="datetime-local" id="auctionStartTime" name="auctionStartTime" required>

        <!-- Auction End Time -->
        <label for="auctionEndTime">Auction End Time</label>
        <input type="datetime-local" id="auctionEndTime" name="auctionEndTime" required>

        <!-- Submit Button -->
        <button type="submit" class="btn">Add Product to Auction</button>
    </form>
</div>

<script src="add.js"></script> <!-- Link to external JS -->
</body>
</html>
