<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Address</title>
    <link rel="stylesheet" href="add.css">
</head>
<body>
    <div class="container">
        <h2>Add New Address</h2>
        <form id="addressForm">
            <div class="form-group">
                <label for="country">Country/Region</label>
                <select id="country" name="country" required>
                    <option value="">Select your country</option>
                    <option value="India">India</option>
                    <option value="United States">United States</option>
                    <option value="Canada">Canada</option>
                    <option value="Australia">Australia</option>
                </select>
            </div>

            <div class="form-group">
                <label for="fullname">Full Name</label>
                <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label for="mobile">Mobile Number</label>
                <input type="tel" id="mobile" name="mobile" placeholder="Enter your mobile number" required>
            </div>

            <div class="form-group">
                <label for="flat">Flat/House Number</label>
                <input type="text" id="flat" name="flat" placeholder="Enter your flat or house number" required>
            </div>

            <div class="form-group">
                <label for="building">Building/Company/Apartment</label>
                <input type="text" id="building" name="building" placeholder="Enter building, company, or apartment">
            </div>

            <div class="form-group">
                <label for="area">Area/Street/Sector</label>
                <input type="text" id="area" name="area" placeholder="Enter area, street, or sector">
            </div>

            <div class="form-group">
                <label for="village">Village</label>
                <input type="text" id="village" name="village" placeholder="Enter your village">
            </div>

            <div class="form-group">
                <label for="landmark">Landmark</label>
                <input type="text" id="landmark" name="landmark" placeholder="Enter a nearby landmark">
            </div>

            <div class="form-group">
                <label for="pincode">Pincode</label>
                <input type="text" id="pincode" name="pincode" placeholder="Enter your pincode" required>
            </div>

            <div class="form-group">
                <label for="city">Town/City</label>
                <input type="text" id="city" name="city" placeholder="Enter your town or city" required>
            </div>

            <div class="form-group">
                <label for="state">State</label>
                <select id="state" name="state" required>
                    <option value="">Select your state</option>
                </select>
            </div>

            <button type="submit">Save Address</button>
        </form>
    </div>

    <script src="address2.js"></script>
</body>
</html>
